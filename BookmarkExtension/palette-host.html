<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: transparent;
        /* Must match the palette document's color-scheme, or Chromium paints
           the inner cross-origin iframe on an opaque canvas. */
        color-scheme: light;
      }
      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: none;
        background: transparent;
        color-scheme: light;
      }
    </style>
  </head>
  <body>
    <script src="palette-host.js" type="module"></script>
  </body>
</html>
