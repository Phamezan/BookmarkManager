<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Bookmark Manager Sync</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div id="app">

      <!-- ── Header ─────────────────────────────────────────────────── -->
      <header>
        <div class="brand">
          <svg class="brand-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M5 5C5 3.89543 5.89543 3 7 3H17C18.1046 3 19 3.89543 19 5V21L12 17.5L5 21V5Z"
              stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          </svg>
          <span class="brand-name">Bookmark Sync</span>
        </div>
        <div id="status-dot" class="status-dot status-unconfigured" title="Not configured"></div>
      </header>

      <!-- ── Normal Mode (connection / sync settings) ─────────────── -->
      <div id="normal-mode">

        <!-- ── Connection Section ─────────────────────────────────────── -->
        <section class="card" id="connection-section">
          <label for="api-url">API Base URL</label>
          <div class="input-row">
            <select id="api-url" aria-label="API Base URL"></select>
            <button id="save-btn" type="button" class="btn-primary" aria-label="Save and connect">
              <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M5 12L10 17L19 7" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
          <p id="connection-message" class="message" role="alert" aria-live="polite"></p>
        </section>

        <!-- ── Sync Status Section ────────────────────────────────────── -->
        <section class="card" id="status-section">
          <div class="status-row">
            <span class="status-label">Status</span>
            <span id="sync-state" class="status-value">Not configured</span>
          </div>
          <div class="status-row">
            <span class="status-label">Last sync</span>
            <span id="last-sync" class="status-value muted">—</span>
          </div>
          <div class="status-row">
            <span class="status-label">Pending events</span>
            <span id="pending-count" class="status-value muted">0</span>
          </div>
          <p id="error-code" class="message error" role="alert" aria-live="polite"></p>
        </section>

        <!-- ── Keyboard Shortcut Section ──────────────────────────────── -->
        <section class="card" id="shortcut-section">
          <div class="shortcut-row">
            <div class="shortcut-info">
              <span class="shortcut-title">Quick Bookmark</span>
              <span class="shortcut-desc">Bookmarks current page in last visited folder</span>
            </div>
            <kbd id="shortcut-badge">Ctrl+Shift+F</kbd>
          </div>
          <button id="configure-shortcut-btn" type="button" class="btn-link">
            Change keybind →
          </button>
        </section>

        <!-- ── Open Manager Section ───────────────────────────────────── -->
        <section class="card" id="open-manager-section" style="margin-top: 10px;">
          <button id="open-manager-btn" type="button" class="btn-primary btn-full">
            <span>Open Manager</span>
          </button>
        </section>

        <!-- ── Browser HTML Export Section ────────────────────────────── -->
        <section class="card" id="backup-section" style="margin-top: 10px;">
          <label for="backup-subfolder">Export folder (inside Downloads)</label>
          <input type="text" id="backup-subfolder" autocomplete="off" spellcheck="false" placeholder="BookmarkManagerBackups" />
          <button id="backup-btn" type="button" class="btn-primary btn-full">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M12 4V15M12 15L8 11M12 15L16 11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 17V18C5 19.1046 5.89543 20 7 20H17C18.1046 20 19 19.1046 19 18V17" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
            <span>Export Bookmarks (HTML)</span>
          </button>
          <p id="backup-message" class="message" role="alert" aria-live="polite"></p>
        </section>

        <!-- ── Danger Section ─────────────────────────────────────────── -->
        <section id="danger-section">
          <button id="clear-btn" type="button" class="btn-danger">Clear local data</button>
        </section>

      </div>

      <!-- ── Duplicate Confirmation Mode (shortcut) ─────────────────── -->
      <section class="card editor-card" id="duplicate-mode" hidden>
        <div class="editor-head">
          <div class="editor-head-info">
            <span class="editor-mode-label">Series already bookmarked</span>
            <span id="duplicate-host" class="editor-host"></span>
          </div>
          <button id="duplicate-close-btn" type="button" class="editor-close" aria-label="Cancel" title="Cancel">&times;</button>
        </div>
        <p id="duplicate-message" class="message info" role="alert" aria-live="polite"></p>
        <ul id="duplicate-list" class="duplicate-list"></ul>
        <div class="editor-actions">
          <button id="duplicate-cancel-btn" type="button" class="btn-danger editor-remove-btn">Cancel</button>
          <button id="duplicate-create-btn" type="button" class="btn-primary editor-done-btn">Create anyway</button>
        </div>
      </section>

      <!-- ── Editor Mode (shortcut) ─────────────────────────────────── -->
      <section class="card editor-card" id="editor-mode" hidden>
        <div class="editor-head">
          <img id="editor-favicon" class="editor-favicon" alt="" src="" />
          <div class="editor-head-info">
            <span id="editor-mode-label" class="editor-mode-label">Edit bookmark</span>
            <span id="editor-host" class="editor-host"></span>
          </div>
          <button id="editor-close-btn" type="button" class="editor-close" aria-label="Close editor" title="Close">&times;</button>
        </div>
        <label for="editor-title">Name</label>
        <input type="text" id="editor-title" autocomplete="off" spellcheck="false" />
        <label for="editor-folder">Folder</label>
        <select id="editor-folder"></select>
        <p id="editor-message" class="message" role="alert" aria-live="polite"></p>
        <div class="editor-actions">
          <button id="editor-remove-btn" type="button" class="btn-danger editor-remove-btn">Remove</button>
          <button id="editor-done-btn" type="button" class="btn-primary editor-done-btn">Done</button>
        </div>
      </section>

    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
